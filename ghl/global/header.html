<style>
/* Google Fonts — Dual-Serif System */
@import url('https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500&family=Noto+Serif:wght@400;700&display=swap');

/* ================================================================
   Navigation
   ================================================================ */

.site-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  padding: 0.5rem 0;
  background-color: #fbf9f3;
  transition: background-color 300ms ease-out;
}

.site-nav .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 72rem;
  margin-left: auto;
  margin-right: auto;
  padding-left: 1rem;
  padding-right: 1rem;
}

.nav-logo {
  display: block;
  height: 2rem;
  width: auto;
  flex-shrink: 0;
}

.nav-links {
  display: none;
  align-items: center;
  gap: 1.5rem;
}

.nav-links a {
  font-family: 'Newsreader', serif;
  font-size: 1rem;
  font-weight: 500;
  text-decoration: none;
  color: #1b1c18;
  transition: color 200ms ease-out;
  white-space: nowrap;
}

.nav-links a:hover {
  color: #c9a84c;
}

.nav-links a.active {
  color: #c9a84c;
}

/* Nav CTA button */
.nav-cta {
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0.75rem 1.5rem;
  background: linear-gradient(135deg, #012d1d, #1b4332);
  color: #ffffff !important;
  font-family: 'Newsreader', serif;
  font-size: 0.875rem;
  font-weight: 500;
  text-decoration: none;
  border-radius: 0.125rem;
  transition: transform 200ms ease-out, box-shadow 200ms ease-out;
  white-space: nowrap;
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 24px rgba(27, 28, 24, 0.04);
  color: #ffffff !important;
}

/* Hamburger */
.nav-hamburger {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 0.25rem;
  background: none;
  border: none;
  cursor: pointer;
  z-index: 301;
}

.nav-hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background-color: #1b1c18;
  transition: transform 200ms ease-out, opacity 200ms ease-out;
}

.nav-hamburger.is-open span:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}

.nav-hamburger.is-open span:nth-child(2) {
  opacity: 0;
}

.nav-hamburger.is-open span:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}

/* Mobile overlay */
.nav-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #012d1d;
  z-index: 300;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 300ms ease-out;
}

.nav-overlay.is-open {
  opacity: 1;
  pointer-events: auto;
}

.nav-overlay a {
  font-family: 'Noto Serif', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: #ffffff;
  text-decoration: none;
  transition: color 200ms ease-out;
}

.nav-overlay a:hover {
  color: #c9a84c;
}

/* Overlay CTA */
.nav-overlay-cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 1rem 2rem;
  background: linear-gradient(135deg, #1b4332, #012d1d);
  color: #ffffff;
  font-family: 'Newsreader', serif;
  font-size: 1rem;
  font-weight: 500;
  text-decoration: none;
  border-radius: 0.125rem;
  margin-top: 1rem;
  transition: transform 200ms ease-out, box-shadow 200ms ease-out;
}

.nav-overlay-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 24px rgba(27, 28, 24, 0.04);
  color: #ffffff;
}

@media (min-width: 769px) {
  .site-nav .container {
    padding-left: 2rem;
    padding-right: 2rem;
  }

  .nav-links {
    display: flex;
  }

  .nav-cta {
    display: inline-flex;
  }

  .nav-hamburger {
    display: none;
  }

  .nav-logo {
    height: 2.25rem;
  }
}

/* ================================================================
   Skip Link
   ================================================================ */

.skip-link {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
  top: 0.5rem;
  left: 1rem;
  z-index: 500;
  text-decoration: none;
}

.skip-link:focus {
  width: auto;
  height: auto;
  clip: auto;
  overflow: visible;
  margin: 0;
  padding: 0.5rem 1rem;
  background-color: #012d1d;
  color: #ffffff;
  font-family: 'Newsreader', serif;
  font-size: 0.875rem;
  border-radius: 0.25rem;
}
</style>

<a href="#main-content" class="skip-link">Skip to main content</a>

<header class="site-nav" role="banner">
  <div class="container">
    <a href="/" aria-label="Virginia Nonprofits — Home">
      <img src="https://assets.cdn.filesafe.space/3M40xtrRZZRWOmE1zFAN/media/69c7d9db3204cc0a454c7337.png" alt="Virginia Nonprofits" class="nav-logo">
    </a>
    <nav class="nav-links" aria-label="Primary navigation">
      <a href="/directory">Directory</a>
      <a href="/about">About</a>
      <a href="/submit">Submit a Nonprofit</a>
      <a href="/submit" class="nav-cta">Join the Directory</a>
    </nav>
    <button class="nav-hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>

<script>
(function () {
  'use strict';

  var hamburger = document.querySelector('.nav-hamburger');
  var nav = document.querySelector('.site-nav');
  var overlay = null;

  function createOverlay() {
    overlay = document.createElement('div');
    overlay.className = 'nav-overlay';
    overlay.setAttribute('aria-hidden', 'true');

    var links = [
      { text: 'Directory', href: '/directory' },
      { text: 'About', href: '/about' },
      { text: 'Submit a Nonprofit', href: '/submit' }
    ];

    links.forEach(function (link) {
      var a = document.createElement('a');
      a.href = link.href;
      a.textContent = link.text;
      overlay.appendChild(a);
    });

    var cta = document.createElement('a');
    cta.href = '/submit';
    cta.className = 'nav-overlay-cta';
    cta.textContent = 'Join the Directory';
    overlay.appendChild(cta);

    document.body.appendChild(overlay);
  }

  function toggleNav() {
    if (!overlay) createOverlay();

    var isOpen = hamburger.classList.toggle('is-open');
    overlay.classList.toggle('is-open', isOpen);
    overlay.setAttribute('aria-hidden', !isOpen);
    document.body.style.overflow = isOpen ? 'hidden' : '';

    if (isOpen) {
      hamburger.querySelectorAll('span').forEach(function (span) {
        span.style.backgroundColor = '#ffffff';
      });
    } else {
      hamburger.querySelectorAll('span').forEach(function (span) {
        span.style.backgroundColor = '';
      });
    }
  }

  if (hamburger) {
    hamburger.addEventListener('click', toggleNav);
  }

  /* Active Nav State */
  function initActiveNav() {
    var currentPath = window.location.pathname.replace(/\/$/, '');
    var navAnchors = document.querySelectorAll('.nav-links a:not(.nav-cta)');

    navAnchors.forEach(function (a) {
      var href = a.getAttribute('href');
      if (!href) return;
      var normalizedHref = href.replace(/\/$/, '');
      if (currentPath === normalizedHref || (currentPath === '' && normalizedHref === '')) {
        a.classList.add('active');
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initActiveNav);
  } else {
    initActiveNav();
  }
})();
</script>
