<!-- Supabase JS Client (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<div class="vn-content">
    <!-- ====== Page Header ====== -->
    <section id="main-content" class="directory-header">
      <div class="container">
        <h1 class="directory-title">The Directory</h1>
        <p class="directory-subhead">Explore nonprofits across Virginia by region, cause, or keyword.</p>
        <div class="directory-search">
          <label for="directory-search-input" class="visually-hidden">Search nonprofits</label>
          <input type="search" id="directory-search-input" class="form-input directory-search-input" placeholder="Search by name, mission, or keyword" data-search>
        </div>
      </div>
    </section>

    <!-- ====== Sticky Filter Bar ====== -->
    <div class="sticky-filter" data-sticky-filter>
      <div class="container">
        <div class="filter-group">
          <span class="filter-label text-label">Region</span>
          <div class="pill-row" data-filter-region>
            <button class="pill is-active" data-region="all">All Regions</button>
            <button class="pill" data-region="shenandoah-valley">Shenandoah Valley</button>
            <button class="pill" data-region="southwest-va">Southwest VA</button>
            <button class="pill" data-region="central-va">Central VA</button>
            <button class="pill" data-region="northern-va">Northern VA</button>
            <button class="pill" data-region="hampton-roads">Hampton Roads</button>
            <button class="pill" data-region="southside-va">Southside VA</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label text-label">Cause</span>
          <div class="pill-row" data-filter-cause>
            <button class="pill" data-cause="youth-education">Youth &amp; Education</button>
            <button class="pill" data-cause="food-security">Food Security</button>
            <button class="pill" data-cause="housing">Housing</button>
            <button class="pill" data-cause="arts-culture">Arts &amp; Culture</button>
            <button class="pill" data-cause="veterans">Veterans</button>
            <button class="pill" data-cause="health-wellness">Health &amp; Wellness</button>
            <button class="pill" data-cause="environment">Environment</button>
            <button class="pill" data-cause="animal-welfare">Animal Welfare</button>
            <button class="pill" data-cause="faith-based">Faith-Based</button>
            <button class="pill" data-cause="civic-community">Civic &amp; Community</button>
            <button class="pill" data-cause="sports-recreation">Sports &amp; Recreation</button>
          </div>
        </div>
        <div class="filter-meta">
          <span class="filter-count" data-filter-count>Showing 24 nonprofits</span>
          <button class="filter-clear" data-filter-clear>Clear filters</button>
        </div>
      </div>
    </div>

    <!-- ====== Listings Grid ====== -->
    <section class="listings" aria-label="Nonprofit listings">
      <div class="container">

        <div class="listings-grid" data-listings-grid>

          <!-- Skeleton loading state -->
          <article class="listing-card skeleton-card" aria-hidden="true">
            <div class="listing-content">
              <div class="card-tags"><span class="skeleton-line skeleton-tag"></span><span class="skeleton-line skeleton-tag"></span></div>
              <div class="skeleton-line skeleton-title"></div>
              <div class="skeleton-line skeleton-text"></div>
              <div class="skeleton-line skeleton-text skeleton-text--short"></div>
              <div class="skeleton-line skeleton-action"></div>
            </div>
          </article>
          <article class="listing-card skeleton-card" aria-hidden="true">
            <div class="listing-content">
              <div class="card-tags"><span class="skeleton-line skeleton-tag"></span><span class="skeleton-line skeleton-tag"></span></div>
              <div class="skeleton-line skeleton-title"></div>
              <div class="skeleton-line skeleton-text"></div>
              <div class="skeleton-line skeleton-text skeleton-text--short"></div>
              <div class="skeleton-line skeleton-action"></div>
            </div>
          </article>
          <article class="listing-card skeleton-card" aria-hidden="true">
            <div class="listing-content">
              <div class="card-tags"><span class="skeleton-line skeleton-tag"></span><span class="skeleton-line skeleton-tag"></span></div>
              <div class="skeleton-line skeleton-title"></div>
              <div class="skeleton-line skeleton-text"></div>
              <div class="skeleton-line skeleton-text skeleton-text--short"></div>
              <div class="skeleton-line skeleton-action"></div>
            </div>
          </article>
          <article class="listing-card skeleton-card" aria-hidden="true">
            <div class="listing-content">
              <div class="card-tags"><span class="skeleton-line skeleton-tag"></span><span class="skeleton-line skeleton-tag"></span></div>
              <div class="skeleton-line skeleton-title"></div>
              <div class="skeleton-line skeleton-text"></div>
              <div class="skeleton-line skeleton-text skeleton-text--short"></div>
              <div class="skeleton-line skeleton-action"></div>
            </div>
          </article>
          <article class="listing-card skeleton-card" aria-hidden="true">
            <div class="listing-content">
              <div class="card-tags"><span class="skeleton-line skeleton-tag"></span><span class="skeleton-line skeleton-tag"></span></div>
              <div class="skeleton-line skeleton-title"></div>
              <div class="skeleton-line skeleton-text"></div>
              <div class="skeleton-line skeleton-text skeleton-text--short"></div>
              <div class="skeleton-line skeleton-action"></div>
            </div>
          </article>
          <article class="listing-card skeleton-card" aria-hidden="true">
            <div class="listing-content">
              <div class="card-tags"><span class="skeleton-line skeleton-tag"></span><span class="skeleton-line skeleton-tag"></span></div>
              <div class="skeleton-line skeleton-title"></div>
              <div class="skeleton-line skeleton-text"></div>
              <div class="skeleton-line skeleton-text skeleton-text--short"></div>
              <div class="skeleton-line skeleton-action"></div>
            </div>
          </article>

        </div>

        <!-- Error state -->
        <div class="listings-error" data-listings-error style="display: none;">
          <p class="listings-error-text">Something went wrong loading the directory. Please try again.</p>
          <button class="btn-primary" data-error-retry>Retry</button>
        </div>

        <!-- Empty state -->
        <div class="listings-empty" data-listings-empty style="display: none;">
          <p class="listings-empty-text">No nonprofits match your current filters. Try broadening your search or clearing filters to see the full directory.</p>
          <button class="btn-primary" data-filter-clear-all>Clear All Filters</button>
        </div>

        <!-- Pagination -->
        <nav class="pagination" aria-label="Directory pagination" data-pagination>
          <button class="pagination-btn pagination-prev" data-page-prev disabled>Previous</button>
          <div class="pagination-pages" data-page-numbers>
            <button class="pagination-page is-active" data-page="1">1</button>
            <button class="pagination-page" data-page="2">2</button>
          </div>
          <button class="pagination-btn pagination-next" data-page-next>Next</button>
        </nav>

      </div>
    </section>
</div>
